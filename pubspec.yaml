name: dairyhelper
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  url_launcher: ^6.3.2
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  rename: ^3.1.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/dairy.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    